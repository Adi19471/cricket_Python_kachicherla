<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Black Box Cricket Booking{% endblock %}</title>
    
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f5ff;
            --primary-dark: #00b8cc;
            --dark: #8d8b8b;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --text-muted: #b0b0b0;
            --border: #333;
        }

        * {
            transition: all 0.3s ease;
        }

        body {
            background: #dcdbdb;
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(10, 10, 10, 0.98) !important;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 245, 255, 0.2);
        }

        .navbar-brand {
            font-weight: 800;
            font-size: 1.9rem;
            letter-spacing: -1px;
            color: var(--primary) !important;
        }

        .nav-link {
            color: var(--text) !important;
            font-weight: 500;
        }

        .nav-link:hover {
            color: var(--primary) !important;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 245, 255, 0.15);
        }

        /* Form Controls */
        .form-control {
            background-color: #706e6e;
            border: 1px solid var(--border);
            color: white;
            border-radius: 12px;
            padding: 14px 16px;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 245, 255, 0.15);
            background-color: #7e7979;
        }

        .form-label {
            font-weight: 500;
            color: var(--text-muted);
        }

        /* Buttons */
        .btn-primary {
            background: var(--primary);
            border: none;
            color: #000;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 50px;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            color: white;
            transform: translateY(-3px);
        }

        /* Time Slot Boxes */
        .slot-box {
            background: #cfcccc;
            cursor: pointer;
            user-select: none;
            font-size: 1.05rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 18px 12px;
            text-align: center;
        }

        .slot-box:hover:not(.slot-booked) {
            background: #2a2a2a;
            border-color: var(--primary);
        }

        .slot-selected {
            background: #00f5ff !important;
            color: #9e6565 !important;
            border-color: #00f5ff !important;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.6);
            font-weight: 700;
        }

        .slot-booked {
            background: #998585 !important;
            color: #666 !important;
            cursor: not-allowed;
            text-decoration: line-through;
            opacity: 0.75;
        }

        /* Total Price */
        .total-price {
            font-size: 2.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .section-title {
            position: relative;
            display: inline-block;
            font-weight: 700;
        }

        .section-title:after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 65%;
            height: 3px;
            background: var(--primary);
            border-radius: 10px;
        }

        /* Payment Method Cards */
        .payment-method-card {
            background: #aca2a2;
        }

        .payment-method-card:hover {
            background: #625c5c;
            border-color: var(--primary) !important;
            transform: translateY(-4px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .total-price {
                font-size: 1.9rem;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">
                <i class="fas fa-cricket-ball me-2"></i>BLACK BOX
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'home' %}"><i class="fas fa-calendar-alt me-1"></i> Book Slot</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'history' %}"><i class="fas fa-history me-1"></i> My Bookings</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-danger" href="{% url 'logout' %}">
                                <i class="fas fa-sign-out-alt me-1"></i> Logout ({{ user.username }})
                            </a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'login' %}"><i class="fas fa-sign-in-alt me-1"></i> Login</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link btn btn-primary px-4 ms-2 text-dark" href="{% url 'register' %}">
                                Register
                            </a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 pt-5">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-dark py-4 mt-auto">
        <div class="container text-center text-muted">
            <p>&copy; 2026 Black Box Cricket. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
