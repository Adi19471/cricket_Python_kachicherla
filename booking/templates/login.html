{% extends 'base.html' %}

{% block title %}Login - Black Box Cricket{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            
            <!-- Login Card -->
            <div class="card shadow-lg border-0" style="background: rgba(26, 26, 26, 0.95);">
                <div class="card-body p-5">
                    
                    <!-- Header -->
                    <div class="text-center mb-5">
                        <div class="mx-auto mb-4" style="width: 80px; height: 80px; background: rgba(0, 245, 255, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                            <i class="fas fa-cricket-ball fa-3x text-primary"></i>
                        </div>
                        <h2 class="fw-bold mb-1">Welcome Back</h2>
                        <p class="text-muted">Login to book your cricket slots</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-4">
                            <label class="form-label fw-medium text-light">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-dark border-secondary text-muted">
                                    <i class="fas fa-user"></i>
                                </span>
                                <input type="text" 
                                       class="form-control bg-dark text-white border-secondary"
                                       name="username" 
                                       placeholder="Enter your username"
                                       required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-medium text-light">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-dark border-secondary text-muted">
                                    <i class="fas fa-lock"></i>
                                </span>
                                <input type="password" 
                                       class="form-control bg-dark text-white border-secondary"
                                       name="password" 
                                       placeholder="Enter your password"
                                       required>
                            </div>
                        </div>

                        <!-- Remember Me & Forgot Password -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label text-muted" for="remember">Remember me</label>
                            </div>
                            <a href="#" class="text-primary text-decoration-none small">Forgot Password?</a>
                        </div>

                        <button type="submit" 
                                class="btn btn-primary w-100 py-3 fs-5 fw-semibold rounded-pill">
                            <i class="fas fa-sign-in-alt me-2"></i>Login
                        </button>
                    </form>

                    <!-- Register Link -->
                    <div class="text-center mt-5">
                        <p class="text-muted mb-0">
                            Don't have an account? 
                            <a href="{% url 'register' %}" 
                               class="text-primary fw-bold text-decoration-none">
                                Register Now
                            </a>
                        </p>
                    </div>

                </div>
            </div>

            <!-- Footer Note -->
            <div class="text-center mt-4">
                <small class="text-muted">
                    Black Box Cricket • Premium Turf Booking
                </small>
            </div>

        </div>
    </div>
</div>
{% endblock %}
